<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farmers Fightback Rally — Marnoo, Sat 29 August</title>
  <meta name="description" content="A night to fight for the future of farming. Saturday 29 August, Marnoo Cricket Ground. Grab your tickets."/>
  <meta property="og:title" content="Farmers Fightback Rally — Sat 29 August, Marnoo"/>
  <meta property="og:description" content="A night to fight for the future of farming — everyone welcome."/>
  <meta property="og:image" content="https://www.farmersfightback.com/assets/uploads/parliament-house-group.jpg"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://www.farmersfightback.com/rally"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="theme-color" content="#1F6B3B"/>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <link rel="alternate icon" href="/assets/logo.png"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Caveat:wght@600;700&family=Source+Sans+3:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet"/>

  <!-- Stripe.js — loaded eagerly so the embedded checkout mounts without a
       flash of missing script when the buyer reaches the payment step. -->
  <script src="https://js.stripe.com/v3/"></script>

  <style>
    :root{
      --field-green:#1F6B3B; --field-deep:#175530; --sky-blue:#2C6E8F; --sun-gold:#F4B400;
      --cream:#FBF7EC; --cream-dim:#F1E9D4; --ink:#25241F; --ink-soft:#5b574b;
      --navy:#12354B; --barn:#AE3528;
      --f-disp:"Oswald",sans-serif; --f-script:"Caveat",cursive; --f-body:"Source Sans 3",system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#e7e3d7}
    body{font-family:var(--f-body);color:var(--ink);
      background-image:radial-gradient(circle at 50% -10%,#f2eee2,#dcd8cb 80%);min-height:100vh}

    /* ---- masthead: cream + sunburst ---- */
    .ffx-app{background:var(--cream);color:var(--ink);min-height:100%;font-size:16px;line-height:1.5}
    .ffx-mast{position:relative;overflow:hidden;text-align:center;padding:44px 24px 30px}
    /* Sunburst rays + sun disc scale with viewport so they always extend
       past the edges of even ultra-wide monitors. Anchored at 50% 100% of
       the .ffx-rays box so the point-of-origin stays at the bottom-centre
       under the FARMERS FIGHTBACK title. */
    .ffx-rays{position:absolute;top:min(-220px,-30vw);left:50%;transform:translateX(-50%);
      width:min(2600px,200vw);height:min(1400px,120vw);pointer-events:none;
      background:repeating-conic-gradient(from 0deg at 50% 100%,rgba(244,180,0,0.15) 0deg 4deg,transparent 4deg 12deg)}
    .ffx-sun{position:absolute;top:min(-160px,-18vw);left:50%;transform:translateX(-50%);
      width:min(720px,68vw);height:min(720px,68vw);border-radius:50%;
      background:radial-gradient(circle,rgba(244,180,0,0.42) 0 28%,rgba(244,180,0,0.16) 29% 50%,transparent 64%);pointer-events:none}
    .ffx-mast-in{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
    .ffx-logo{height:56px;width:auto;display:block}
    .ffx-kicker{font-family:var(--f-script);font-weight:700;color:var(--field-green);font-size:38px;line-height:0.9;
      margin-top:20px;transform:rotate(-2deg)}
    .ffx-title{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;color:var(--barn);
      font-size:64px;line-height:0.84;letter-spacing:-0.01em;margin-top:2px;display:flex;flex-direction:column;align-items:center}
    .ffx-rally{font-family:var(--f-script);font-weight:700;text-transform:none;font-size:74px;line-height:0.7;
      color:var(--sun-gold);-webkit-text-stroke:2px var(--field-green);paint-order:stroke fill;
      text-shadow:2px 3px 0 rgba(31,107,59,0.28);margin-top:0}
    .ffx-sub{font-size:19px;line-height:1.35;color:var(--ink-soft);max-width:480px;margin-top:10px;text-wrap:pretty}
    .ffx-sub strong{color:var(--field-green);font-weight:700}
    .ffx-band{margin-top:20px;width:100%;max-width:520px;background:var(--field-green);color:#fff;border-radius:18px;
      padding:18px 22px;box-shadow:0 12px 26px rgba(31,107,59,0.22)}
    .ffx-band-date{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:42px;line-height:0.98;letter-spacing:0.01em}
    .ffx-band-time{font-family:var(--f-disp);font-weight:500;text-transform:uppercase;letter-spacing:0.14em;font-size:17px;color:var(--sun-gold);margin-top:2px}
    .ffx-band-place{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:26px;line-height:1;letter-spacing:0.01em;margin-top:10px}
    .ffx-band-place small{display:block;font-weight:500;font-size:14px;text-transform:none;letter-spacing:0;opacity:0.9;margin-top:3px}

    /* ---- content wrap ---- */
    .ffx-wrap{max-width:600px;margin:0 auto;padding:6px 20px 40px}

    /* ---- stepper ---- */
    .ffx-stepper{display:flex;gap:8px;margin-bottom:20px}
    .ffx-step{flex:1;display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:12px;
      background:#fff;border:1.5px solid var(--cream-dim);min-width:0}
    .ffx-step-n{width:22px;height:22px;flex:none;border-radius:50%;background:var(--cream-dim);color:var(--ink-soft);
      font-family:var(--f-disp);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
    .ffx-step-l{font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;font-size:11px;
      color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ffx-step.on{border-color:var(--field-green);background:#fff}
    .ffx-step.on .ffx-step-n{background:var(--field-green);color:#fff}
    .ffx-step.on .ffx-step-l{color:var(--field-green)}
    .ffx-step.done .ffx-step-n{background:var(--sun-gold);color:var(--field-green)}

    /* ---- card ---- */
    .ffx-card{background:#fff;border-radius:22px;padding:32px 34px;box-shadow:0 18px 44px rgba(31,107,59,0.12);border:1px solid var(--cream-dim)}
    .ffx-sec-h{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;letter-spacing:0.02em;font-size:16px;
      color:var(--navy);margin:22px 0 12px}
    .ffx-sec-h:first-child{margin-top:0}

    /* ---- VIP banner ---- */
    .ffx-vip{background:linear-gradient(135deg,#fff6dc,#fbe7b0);border:2px solid var(--sun-gold);border-radius:16px;padding:16px 18px;margin-bottom:20px}
    .ffx-vip-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;font-size:11px;color:var(--field-green)}
    .ffx-vip-tag svg{color:var(--sun-gold);stroke:var(--field-green)}
    .ffx-vip-h{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:22px;color:var(--barn);line-height:1;margin-top:6px}
    .ffx-vip-p{font-size:14px;color:var(--ink-soft);margin-top:6px}
    .ffx-vip-tok{font-family:var(--f-body);font-size:12px;color:var(--field-green);margin-top:10px;border-top:1.5px dashed rgba(31,107,59,0.3);padding-top:8px}
    .ffx-vip-tok b{font-weight:700;letter-spacing:0.04em}
    .ffx-vip-err{background:#fdf1ef;border-color:var(--barn)}
    .ffx-vip-err .ffx-vip-tag{color:var(--barn)}
    .ffx-vip-err .ffx-vip-h{color:var(--barn)}

    /* ---- ticket rows ---- */
    .ffx-tickets{display:flex;flex-direction:column;gap:10px}
    .ffx-trow{display:flex;align-items:center;justify-content:space-between;gap:12px;
      background:var(--cream);border:1.5px solid var(--cream-dim);border-radius:14px;padding:14px 16px}
    .ffx-trow-i{display:flex;align-items:center;gap:12px;min-width:0}
    .ffx-trow-ic{color:var(--field-green);flex:none}
    .ffx-trow-n{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:16px;color:var(--navy);display:flex;align-items:baseline;gap:8px}
    .ffx-trow-sub{font-size:11px;letter-spacing:0.04em;color:var(--ink-soft);font-weight:500}
    .ffx-trow-p{font-size:13px;color:var(--ink-soft);margin-top:1px}

    /* ---- qty stepper ---- */
    .ffx-qty{display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--cream-dim);border-radius:999px;padding:3px}
    .ffx-qty-b{width:32px;height:32px;border-radius:50%;border:0;background:var(--field-green);color:#fff;font-size:20px;line-height:1;
      cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--f-disp);transition:background .12s}
    .ffx-qty-b:hover{background:var(--field-deep)}
    .ffx-qty-b:disabled{background:var(--cream-dim);color:#b3ac99;cursor:not-allowed}
    .ffx-qty-v{min-width:26px;text-align:center;font-family:var(--f-disp);font-weight:700;font-size:18px;color:var(--navy)}

    /* ---- fields ---- */
    .ffx-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .ffx-fields .ffx-field:nth-child(3),
    .ffx-fields .ffx-field:nth-child(4),
    .ffx-fields .ffx-field:nth-child(5){grid-column:1 / -1}
    @media (max-width:520px){.ffx-fields{grid-template-columns:1fr}}
    .ffx-field{display:flex;flex-direction:column;gap:5px}
    .ffx-field-l{font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;font-size:11px;color:var(--ink-soft);display:flex;justify-content:space-between}
    .ffx-field-l em{font-style:normal;font-weight:500;color:#a49d8b;letter-spacing:0.02em}
    .ffx-input{font-family:var(--f-body);font-size:15px;color:var(--ink);background:var(--cream);
      border:1.5px solid var(--cream-dim);border-radius:11px;padding:11px 13px;width:100%;transition:border-color .12s,box-shadow .12s}
    .ffx-input:focus{outline:0;border-color:var(--field-green);box-shadow:0 0 0 3px rgba(31,107,59,0.14);background:#fff}
    .ffx-field.err .ffx-input{border-color:var(--barn);background:#fdf1ef}
    .ffx-field-e{font-size:11.5px;color:var(--barn);font-weight:600}
    .ffx-err-line{color:var(--barn);font-size:13px;font-weight:600;margin-top:8px}

    /* ---- cta ---- */
    .ffx-cta-row{display:flex;align-items:center;gap:16px;margin-top:22px;flex-wrap:wrap}
    .ffx-total{display:flex;flex-direction:column;gap:1px}
    .ffx-total-l{font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;font-size:11px;color:var(--ink-soft)}
    .ffx-total-v{font-family:var(--f-disp);font-weight:700;font-size:30px;line-height:0.9;color:var(--navy)}
    .ffx-total-v em{font-style:normal;font-size:15px;color:var(--field-green);font-weight:600}
    .ffx-btn{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;font-size:16px;
      background:var(--field-green);color:#fff;border:0;border-radius:999px;padding:14px 24px;cursor:pointer;
      transition:background .14s,transform .06s;box-shadow:0 8px 20px rgba(31,107,59,0.24)}
    .ffx-btn:hover{background:var(--field-deep)}
    .ffx-btn:active{transform:translateY(1px)}
    .ffx-btn:disabled{background:var(--cream-dim);color:#b3ac99;cursor:not-allowed;box-shadow:none}
    .ffx-btn-lg{flex:1;min-width:200px;padding:16px 24px;font-size:17px}
    .ffx-btn-gold{background:var(--sun-gold);color:var(--field-green);box-shadow:0 8px 20px rgba(244,180,0,0.3)}
    .ffx-btn-gold:hover{background:#e0a516}
    .ffx-btn-gold:disabled{background:rgba(244,180,0,0.4);color:rgba(31,107,59,0.5)}
    .ffx-fine{font-size:12.5px;color:var(--ink-soft);margin-top:10px;line-height:1.4}
    .ffx-fine.light{color:rgba(255,255,255,0.82)}
    .ffx-link{background:none;border:0;color:var(--field-green);font-family:var(--f-disp);font-weight:600;text-transform:uppercase;
      letter-spacing:0.06em;font-size:13px;cursor:pointer;margin-top:16px;display:block}
    .ffx-link:hover{color:var(--field-deep);text-decoration:underline}

    /* ---- checkout ---- */
    .ffx-checkout-head{text-align:left}
    /* Container that Stripe's Embedded Checkout iframe mounts into.
       Must stay EMPTY at mount() time — Stripe rejects targets that
       have child nodes. No min-height so the empty div collapses to
       0 while loading (the sibling .ffx-stripe-loader occupies the
       space); Stripe expands it once mounted. */
    .ffx-stripe-mount{margin:16px 0 8px}
    .ffx-stripe-loader{min-height:520px;margin:16px 0 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--cream);border:1.5px solid var(--cream-dim);border-radius:14px}
    .ffx-lockpill{display:inline-flex;align-items:center;gap:7px;background:rgba(31,107,59,0.1);color:var(--field-green);
      font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;font-size:12px;padding:6px 13px;border-radius:999px}
    .ffx-summary{background:var(--cream);border:1.5px solid var(--cream-dim);border-radius:14px;padding:14px 16px;margin:16px 0 18px}
    .ffx-sum-row{display:flex;justify-content:space-between;font-size:15px;color:var(--ink);padding:5px 0}
    .ffx-sum-total{border-top:1.5px solid var(--cream-dim);margin-top:6px;padding-top:10px;
      font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:18px;color:var(--navy)}
    .ffx-paymount{display:flex;align-items:center;gap:14px;border:1.5px solid var(--cream-dim);border-left:4px solid var(--field-green);border-radius:14px;padding:16px 18px;margin-bottom:16px;background:var(--cream)}
    .ffx-paymount-ic{width:40px;height:40px;flex:none;border-radius:11px;background:rgba(31,107,59,0.12);color:var(--field-green);display:flex;align-items:center;justify-content:center}
    .ffx-paymount-tx{flex:1;min-width:0}
    .ffx-paymount-h{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:14px;color:var(--field-deep);letter-spacing:0.02em;line-height:1}
    .ffx-paymount-tx p{font-size:12.5px;color:var(--ink-soft);line-height:1.4;margin-top:5px}
    .ffx-paymount-amt{font-family:var(--f-disp);font-weight:700;font-size:18px;color:var(--field-deep);white-space:nowrap}
    .ffx-agree{font-size:12px;color:var(--ink-soft);text-align:center;margin:12px 0 0;line-height:1.4}
    .ffx-agree a{color:var(--field-green);font-weight:700;text-decoration:underline;text-underline-offset:2px;cursor:pointer}
    .ffx-agree a:hover{color:var(--field-deep)}
    .ffx-inbox{display:flex;gap:14px;align-items:flex-start;background:rgba(44,110,143,0.08);border:1.5px solid rgba(44,110,143,0.28);border-radius:16px;padding:16px 18px;margin-bottom:2px}
    .ffx-inbox-ic{width:52px;height:52px;flex:none;border-radius:14px;background:var(--field-green);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(31,107,59,0.28)}
    .ffx-inbox-h{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:16px;color:var(--navy);line-height:1}
    .ffx-inbox-code{font-family:var(--f-disp);font-weight:700;font-size:15px;color:var(--field-green);letter-spacing:0.02em;margin-top:6px}
    .ffx-inbox-code b{color:var(--barn);letter-spacing:0.04em}
    .ffx-inbox-tx p{font-size:13.5px;color:var(--ink-soft);margin-top:6px;line-height:1.45}
    .ffx-processing{text-align:center;padding:34px 0 20px}
    .ffx-spinner{width:44px;height:44px;border-radius:50%;border:4px solid var(--cream-dim);border-top-color:var(--field-green);
      margin:0 auto 18px;animation:ffx-spin 0.8s linear infinite}
    @keyframes ffx-spin{to{transform:rotate(360deg)}}
    .ffx-proc-h{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:20px;color:var(--navy)}

    /* ---- confirmation ---- */
    .ffx-success{text-align:center;padding-bottom:8px}
    .ffx-success-badge{width:66px;height:66px;border-radius:50%;background:var(--sun-gold);color:var(--field-green);
      display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(244,180,0,0.4)}
    .ffx-success-script{font-family:var(--f-script);font-weight:700;color:var(--field-green);font-size:54px;line-height:0.8;transform:rotate(-2deg);margin-top:12px}
    .ffx-success-h{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:32px;color:var(--barn);line-height:1;margin-top:6px}
    .ffx-stub{display:flex;background:var(--navy);color:#fff;border-radius:16px;overflow:hidden;margin:20px 0;box-shadow:0 14px 30px rgba(18,53,75,0.3)}
    .ffx-stub-main{flex:1;padding:18px 20px}
    .ffx-stub-eb{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;font-size:11px;color:var(--sun-gold)}
    .ffx-stub-date{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:24px;line-height:1;margin-top:6px}
    .ffx-stub-rows{margin-top:14px;display:flex;flex-direction:column;gap:7px}
    .ffx-stub-rows>div{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;border-top:1px solid rgba(255,255,255,0.12);padding-top:7px}
    .ffx-stub-rows span{color:rgba(255,255,255,0.6);font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;font-size:11px}
    .ffx-stub-rows b{font-weight:700;text-align:right}
    .ffx-stub-tear{width:104px;flex:none;border-left:2px dashed rgba(255,255,255,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px 10px;background:rgba(255,255,255,0.04)}
    .ffx-stub-ref{text-align:center}
    .ffx-stub-ref span{display:block;font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;font-size:9px;color:rgba(255,255,255,0.6)}
    .ffx-stub-ref b{font-family:var(--f-disp);font-weight:700;font-size:14px;letter-spacing:0.04em}
    .ffx-qr{width:60px;height:60px;border-radius:8px;background:
      conic-gradient(#12354B 25%,#fff 0 50%,#12354B 0 75%,#fff 0) 0 0/15px 15px,#fff;border:3px solid #fff}

    /* ---- share + donation blocks ---- */
    .ffx-block{margin-top:18px;border-radius:18px;padding:20px;background:var(--cream);border:1.5px solid var(--cream-dim)}
    .ffx-block-green{background:var(--field-green);border-color:var(--field-green);color:#fff}
    .ffx-block-h h3{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:19px;line-height:1.02;color:var(--navy);margin-top:4px}
    .ffx-block-h h3.light{color:#fff}
    .ffx-block-h p{font-size:13.5px;color:var(--ink-soft);margin-top:6px;line-height:1.4}
    .ffx-block-h p.light{color:rgba(255,255,255,0.85)}
    .ffx-block-eb{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;font-size:11px;color:var(--field-green)}
    .ffx-block-eb.light{color:var(--sun-gold)}
    .ffx-block-eb svg{color:var(--sun-gold)}
    .ffx-scriptgold{font-family:var(--f-script);font-weight:700;text-transform:none;color:var(--sun-gold);font-size:26px;line-height:0.6}
    .ffx-linkrow{display:flex;gap:8px;margin:14px 0 12px}
    .ffx-linkinput{flex:1;font-family:var(--f-body);font-size:13px;color:var(--navy);background:#fff}
    .ffx-copy{flex:none;display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;border:0;border-radius:11px;
      padding:0 16px;font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;font-size:13px;cursor:pointer;transition:background .12s}
    .ffx-copy:hover{background:#0d2739}
    .ffx-copy.ok{background:var(--field-green)}
    .ffx-share-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
    @media (max-width:520px){.ffx-share-grid{grid-template-columns:repeat(2,1fr)}}
    .ffx-share-btn{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--cream-dim);border-radius:12px;
      padding:11px 14px;font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;font-size:13px;
      color:var(--navy);text-decoration:none;cursor:pointer;transition:border-color .12s,transform .06s}
    .ffx-share-btn:hover{border-color:var(--ch);transform:translateY(-1px)}
    .ffx-share-ic{width:32px;height:32px;flex:none;border-radius:9px;background:var(--ch);color:#fff;display:flex;align-items:center;justify-content:center}
    .ffx-don-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px}
    .ffx-don-opt{font-family:var(--f-disp);font-weight:700;font-size:18px;color:#fff;background:rgba(255,255,255,0.12);
      border:2px solid rgba(255,255,255,0.3);border-radius:12px;padding:14px 6px;cursor:pointer;transition:all .12s;
      display:flex;align-items:center;justify-content:center;text-align:center;text-decoration:none}
    .ffx-don-opt:hover{background:rgba(255,255,255,0.2)}
    .ffx-don-opt.on{background:var(--sun-gold);border-color:var(--sun-gold);color:var(--field-green)}
    .ffx-don-other{font-size:14px;text-transform:uppercase;letter-spacing:0.04em}
    .ffx-otherwrap{position:relative;margin-top:10px}
    .ffx-otherpre{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-weight:700;font-size:16px}
    .ffx-otherwrap .ffx-input{padding-left:26px;background:#fff}
    .ffx-don-cta{display:flex;align-items:center;gap:14px;margin-top:16px;flex-wrap:wrap}
    .ffx-don-cta .ffx-btn{flex:1;min-width:180px}
    .ffx-don-thanks{text-align:center;padding:8px 0}
    .ffx-don-check{width:52px;height:52px;border-radius:50%;background:var(--sun-gold);color:var(--field-green);display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px}
    .ffx-don-thanks h3{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:20px;color:#fff}
    .ffx-don-thanks p{font-size:14px;color:rgba(255,255,255,0.85);margin-top:6px}

    /* ---- lineup / on the night ---- */
    .ffx-lineup{margin-top:22px;background:var(--field-green);color:#fff;border-radius:22px;padding:28px 24px;box-shadow:0 18px 44px rgba(31,107,59,0.2);position:relative;overflow:hidden}
    .ffx-lineup::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 50% -10%, rgba(244,180,0,0.2), transparent 60%);pointer-events:none}
    .ffx-lineup-head{position:relative;text-align:center;max-width:460px;margin:0 auto}
    .ffx-lineup-eb{font-family:var(--f-script);font-weight:700;font-size:26px;color:var(--sun-gold);line-height:0.9;display:inline-block;transform:rotate(-2deg)}
    .ffx-lineup-head h2{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:26px;line-height:0.98;margin-top:6px;color:#fff}
    .ffx-lineup-head p{font-size:14px;color:rgba(255,255,255,0.85);margin-top:8px;line-height:1.4;text-wrap:pretty}
    .ffx-speakers{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:22px}
    .ffx-spk{text-align:center}
    .ffx-spk-photo{position:relative;width:100%;aspect-ratio:3/4;border-radius:16px;overflow:hidden;
      background:linear-gradient(160deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04));
      border:1.5px dashed rgba(255,255,255,0.4);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:rgba(255,255,255,0.7)}
    .ffx-spk-photo .ph-txt{font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;font-size:10px}
    /* Real speaker photo fills the whole 3:4 card, clipped to its rounded
       corners by the parent's overflow:hidden. Solid border replaces the
       dashed placeholder frame. */
    .ffx-spk-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
    .ffx-spk-photo.has-img{border-style:solid;border-color:rgba(255,255,255,0.25);background:none}
    .ffx-spk-lead .ffx-spk-photo{border-color:var(--sun-gold);border-style:solid;box-shadow:0 12px 28px rgba(0,0,0,0.24)}
    .ffx-spk-lead .ffx-spk-photo::after{content:"Headliner";position:absolute;top:10px;left:50%;transform:translateX(-50%);
      background:var(--sun-gold);color:var(--field-green);font-family:var(--f-disp);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;font-size:9.5px;padding:3px 10px;border-radius:999px;white-space:nowrap}
    .ffx-spk-name{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:15px;margin-top:10px;line-height:1}
    .ffx-spk-role{font-size:11.5px;color:rgba(255,255,255,0.75);margin-top:3px;line-height:1.25}
    .ffx-onnight{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px;border-top:1.5px solid rgba(255,255,255,0.18);padding-top:18px;justify-items:center}
    .ffx-on-item{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:8px;text-align:center;width:100%}
    .ffx-on-item > div{display:flex;flex-direction:column;align-items:center;text-align:center}
    .ffx-on-ic{position:relative;width:38px;height:38px;flex:none;margin:0 auto;border-radius:11px;background:rgba(255,255,255,0.14);color:var(--sun-gold)}
    .ffx-on-ic svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:block}
    .ffx-on-item b{display:block;font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:13px;line-height:1}
    .ffx-on-item span{display:block;font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px;line-height:1.2}

    /* ---- terms modal ---- */
    .ffx-modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(18,53,75,0.55);backdrop-filter:blur(3px)}
    .ffx-modal-card{background:#fff;border-radius:20px;max-width:560px;width:100%;max-height:82vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,0.35)}
    .ffx-modal-top{position:sticky;top:0;background:var(--field-green);color:#fff;padding:17px 22px;display:flex;align-items:center;justify-content:space-between}
    .ffx-modal-top h3{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:19px;letter-spacing:0.01em}
    .ffx-modal-x{background:rgba(255,255,255,0.16);border:0;color:#fff;width:32px;height:32px;border-radius:50%;font-size:20px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
    .ffx-modal-x:hover{background:rgba(255,255,255,0.28)}
    .ffx-modal-body{padding:22px}
    .ffx-modal-body h4{font-family:var(--f-disp);font-weight:700;text-transform:uppercase;font-size:14px;color:var(--navy);margin:16px 0 5px;letter-spacing:0.02em}
    .ffx-modal-body h4:first-child{margin-top:0}
    .ffx-modal-body p{font-size:13px;color:var(--ink-soft);line-height:1.5}
    .ffx-modal-meta{font-size:11.5px;color:#9a9482;margin-top:20px;border-top:1px solid var(--cream-dim);padding-top:12px}

    /* ---- footer ---- */
    .ffx-foot{max-width:600px;margin:0 auto;padding:22px 20px 34px;border-top:2px solid rgba(31,107,59,0.16);
      display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--navy);font-weight:600}
    .ffx-foot-l{font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;font-size:11px;color:var(--field-green);display:block}
    .ffx-foot-auth{font-family:var(--f-body);font-weight:400;font-size:10.5px;color:var(--ink-soft);text-align:right;max-width:52%}
    .ffx-foot-terms{background:none;border:0;color:var(--field-green);font-family:var(--f-disp);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;font-size:12px;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:3px}
    .ffx-foot-terms:hover{color:var(--field-deep)}

    .ffx-req{color:var(--barn);margin-left:3px;font-weight:800}

    /* Mobile masthead scaling */
    @media (max-width:520px){
      .ffx-mast{padding:34px 24px 26px}
      .ffx-logo{height:46px}
      .ffx-kicker{font-size:30px;margin-top:16px}
      .ffx-title{font-size:44px}
      .ffx-rally{font-size:52px}
      .ffx-sub{font-size:16px;max-width:400px}
      .ffx-band-date{font-size:30px}
      .ffx-band-time{font-size:14px}
      .ffx-band-place{font-size:19px}
      .ffx-card{padding:26px 24px}
      .ffx-success-script{font-size:44px}
      .ffx-success-h{font-size:26px}
    }

    /* Wide-desktop scaling — masthead grows into the extra space, content
       stays at a comfortable reading width */
    @media (min-width:960px){
      .ffx-mast{padding:60px 24px 46px}
      .ffx-logo{height:68px}
      .ffx-kicker{font-size:44px;margin-top:24px}
      .ffx-title{font-size:82px}
      .ffx-rally{font-size:96px}
      .ffx-sub{font-size:21px;max-width:560px}
      .ffx-band{max-width:640px;padding:22px 28px}
      .ffx-band-date{font-size:52px}
      .ffx-band-time{font-size:19px}
      .ffx-band-place{font-size:30px}
      .ffx-wrap{max-width:720px;padding:6px 32px 60px}
      .ffx-lineup{padding:36px 32px}
      .ffx-lineup-head h2{font-size:32px}
      .ffx-lineup-eb{font-size:32px}
    }
    @media (min-width:1440px){
      .ffx-mast{padding:76px 32px 56px}
      .ffx-title{font-size:104px}
      .ffx-rally{font-size:118px}
      .ffx-sub{font-size:23px;max-width:640px}
      .ffx-band{max-width:760px}
      .ffx-band-date{font-size:60px}
      .ffx-wrap{max-width:800px}
    }
