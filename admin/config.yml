backend:
  name: github
  repo: horatio8/FarmersFightback
  branch: claude/deploy-github-pages-UAofF
  # The OAuth proxy URL — set this to the URL of your deployed
  # github-oauth proxy (Cloudflare Worker / Vercel / Render).
  # See README for setup steps. Until this is set, login won't work.
  base_url: https://REPLACE-WITH-YOUR-OAUTH-PROXY.workers.dev

# Where uploads (images) are committed in the repo, and the public URL
# they're served from once GitHub Pages picks them up.
media_folder: assets/uploads
public_folder: assets/uploads

publish_mode: simple

# Force JSON files to round-trip with stable formatting
slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: site
    label: Site content
    description: All copy, numbers, links, and media URLs for the homepage.
    files:
      - file: content/site.json
        name: site
        label: Homepage
        format: json
        editor:
          preview: false
        fields:
          - label: Top banner
            name: topBanner
            widget: object
            collapsed: true
            fields:
              - { label: Show banner, name: enabled, widget: boolean, default: true }
              - { label: Bold text, name: boldText, widget: string }
              - { label: Rest of message, name: text, widget: string }
              - { label: Link text, name: linkText, widget: string }
              - { label: Link href, name: linkHref, widget: string }

          - label: Navigation
            name: nav
            widget: object
            collapsed: true
            fields:
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Href, name: href, widget: string }
                  - { label: Active, name: active, widget: boolean, default: false }
              - { label: Donate button label, name: donateLabel, widget: string }

          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Background video URL (mp4), name: videoUrl, widget: string }
              - label: Title (HTML allowed; <em> and <br/> supported)
                name: titleHtml
                widget: text
              - { label: Subtitle, name: subtitle, widget: text }
              - { label: Primary CTA label, name: primaryCtaLabel, widget: string }
              - { label: Primary CTA href, name: primaryCtaHref, widget: string }
              - { label: Secondary CTA label (opens video modal), name: secondaryCtaLabel, widget: string }

          - label: Impact stats
            name: impactStats
            widget: list
            fields:
              - { label: Value (number), name: value, widget: number, value_type: int }
              - { label: Label, name: label, widget: string }
              - { label: "Suffix (e.g. + or M+)", name: suffix, widget: string, required: false, default: "" }
              - { label: Sub-label / growth, name: grow, widget: string }

          - label: Intro panel
            name: intro
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Heading, name: heading, widget: string }
              - { label: Paragraph, name: lede, widget: text }
              - { label: Video URL (mp4), name: videoUrl, widget: string }

          - label: Latest video block
            name: latestVideo
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Heading (HTML allowed)
                name: headingHtml
                widget: text
              - { label: Paragraph, name: lede, widget: text }
              - label: Meta facts
                name: meta
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Value, name: value, widget: string }
              - { label: Thumbnail caption, name: thumbLabel, widget: string }
              - { label: Timecode, name: timecode, widget: string }
              - { label: Badge text, name: badgeText, widget: string }
              - { label: Caption text, name: captionText, widget: string }
              - label: Links
                name: links
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Href, name: href, widget: string }
                  - { label: Red style, name: red, widget: boolean, default: false }

          - label: What's at stake (summary)
            name: summary
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Heading, name: heading, widget: string }
              - label: Paragraphs (HTML allowed)
                name: paragraphsHtml
                widget: list
                field: { label: Paragraph, name: text, widget: text }
              - label: Stats (right of copy)
                name: stats
                widget: list
                fields:
                  - { label: Number, name: number, widget: string }
                  - { label: Unit (e.g. km, B), name: unit, widget: string }
                  - { label: Label, name: label, widget: string }

          - label: Petition
            name: petition
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Heading, name: heading, widget: string }
              - { label: Paragraph, name: lede, widget: text }
              - label: Bullets
                name: bullets
                widget: list
                field: { label: Bullet, name: text, widget: string }
              - { label: Form receiver URL (Campaign Nucleus), name: receiverUrl, widget: string }
              - { label: Current signature count, name: currentCount, widget: number, value_type: int }
              - { label: Next milestone (e.g. 25000), name: nextMilestone, widget: number, value_type: int }
              - { label: Goal (e.g. 50000), name: goal, widget: number, value_type: int }
              - { label: Submit button label, name: submitLabel, widget: string }
              - { label: Submitting label, name: submittingLabel, widget: string }
              - label: Thanks heading (use {{count}} for new signature number)
                name: thanksHeadingHtml
                widget: text
              - label: Thanks lede (use {{first}} for first name)
                name: thanksLede
                widget: text
              - { label: Share text (clipboard), name: shareText, widget: text }
              - { label: Form fineprint, name: fineprint, widget: text }

          - label: Action cards
            name: actions
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Heading, name: heading, widget: string }
              - label: Cards
                name: cards
                widget: list
                fields:
                  - { label: Kicker (e.g. "01 / Evidence"), name: kicker, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Body, name: body, widget: text }
                  - { label: CTA text, name: cta, widget: string }
                  - { label: CTA href, name: href, widget: string }
                  - label: Tone (placeholder colour)
                    name: tone
                    widget: select
                    options: [navy, dust, red, paddock, sky]
                  - { label: Placeholder label, name: label, widget: string }

          - label: Pull quote
            name: quote
            widget: object
            fields:
              - label: Quote (HTML allowed)
                name: html
                widget: text
              - { label: Name, name: name, widget: string }
              - { label: Place / context, name: place, widget: string }

          - label: Donate band
            name: donate
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Heading, name: heading, widget: string }
              - { label: Body, name: body, widget: text }
              - label: Where the money goes
                name: where
                widget: list
                fields:
                  - { label: Percent, name: percent, widget: string }
                  - { label: Label, name: label, widget: string }
              - label: Donation tiers
                name: tiers
                widget: list
                hint: For each tier, paste the matching Stripe Payment Link URL for one-off and monthly. Get them from https://dashboard.stripe.com/payment-links
                fields:
                  - { label: Amount ($), name: amount, widget: number, value_type: int }
                  - { label: Label, name: label, widget: string }
                  - { label: Stripe one-off Payment Link URL, name: oneOffUrl, widget: string, required: false, default: "" }
                  - { label: Stripe monthly Payment Link URL, name: monthlyUrl, widget: string, required: false, default: "" }
              - label: Stripe link — custom one-off (customer-chosen amount)
                name: customOneOffUrl
                widget: string
                required: false
                default: ""
              - label: Stripe link — custom monthly (customer-chosen amount)
                name: customMonthlyUrl
                widget: string
                required: false
                default: ""
              - { label: Default selected tier, name: defaultPick, widget: number, value_type: int }
              - { label: Fineprint, name: fineprint, widget: text }

          - label: Newsletter
            name: newsletter
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Lede, name: lede, widget: text }
              - { label: Email placeholder, name: placeholder, widget: string }
              - { label: Subscribe button label, name: ctaLabel, widget: string }
              - { label: Done message, name: doneText, widget: string }

          - label: Footer
            name: footer
            widget: object
            collapsed: true
            fields:
              - { label: Brand blurb, name: blurb, widget: text }
              - label: Social links
                name: social
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Href, name: href, widget: string }
              - label: Columns
                name: columns
                widget: list
                fields:
                  - { label: Heading, name: heading, widget: string }
                  - label: Links
                    name: links
                    widget: list
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: Href, name: href, widget: string }
              - { label: Legal line, name: legal, widget: string }
              - { label: Platform line, name: platform, widget: string }

          # ---------- News page ----------
          - label: News page
            name: news
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Heading, name: heading, widget: string }
              - { label: Lede, name: lede, widget: text }
              - label: YouTube auto-feed
                name: youtube
                widget: object
                fields:
                  - { label: "Channel ID (UC…)", name: channelId, widget: string, hint: "Find at youtube.com/<your-channel> → View page source → search for externalId" }
                  - { label: "@handle", name: handle, widget: string }
                  - { label: Channel URL, name: url, widget: string }
                  - { label: Section heading, name: heading, widget: string }
                  - { label: Section lede, name: lede, widget: text }
              - label: Newsletter archive
                name: newsletter
                widget: object
                fields:
                  - { label: Section heading, name: heading, widget: string }
                  - { label: Section lede, name: lede, widget: text }
                  - { label: Subscribe URL, name: subscribeUrl, widget: string, required: false }
                  - label: Items
                    name: items
                    widget: list
                    fields:
                      - { label: Title, name: title, widget: string }
                      - { label: Date, name: date, widget: date }
                      - { label: Excerpt, name: excerpt, widget: text }
                      - { label: URL, name: url, widget: string, required: false }
              - label: Social accounts
                name: socials
                widget: object
                fields:
                  - { label: Section heading, name: heading, widget: string }
                  - { label: Section lede, name: lede, widget: text }
                  - label: Accounts
                    name: accounts
                    widget: list
                    fields:
                      - { label: Platform, name: platform, widget: select, options: [youtube, tiktok, x, facebook, instagram, threads, linkedin] }
                      - { label: Handle / display name, name: handle, widget: string }
                      - { label: URL, name: url, widget: string }
                  - label: Embedded feed (optional)
                    name: embed
                    widget: object
                    required: false
                    fields:
                      - { label: Kind, name: kind, widget: select, options: [tiktok, none], default: none }
                      - { label: Username (no @), name: username, widget: string, required: false }
              - label: Press coverage
                name: press
                widget: object
                fields:
                  - { label: Section heading, name: heading, widget: string }
                  - { label: Section lede, name: lede, widget: text }
                  - label: Items
                    name: items
                    widget: list
                    fields:
                      - { label: Outlet, name: outlet, widget: string }
                      - { label: Headline, name: headline, widget: string }
                      - { label: URL, name: url, widget: string, required: false }

          # ---------- Take Action umbrella ----------
          - label: Take Action page
            name: takeAction
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Heading, name: heading, widget: string }
              - { label: Lede, name: lede, widget: text }
              - label: Campaign cards
                name: campaigns
                widget: list
                fields:
                  - { label: Slug (URL), name: slug, widget: string, hint: "Used in URL: /take-action/<slug>" }
                  - { label: Kicker, name: kicker, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Summary, name: summary, widget: text }
                  - { label: CTA label, name: cta, widget: string }
                  - { label: Tone, name: tone, widget: select, options: [navy, red, paddock], default: navy }
              - label: Trust badges
                name: trustBadges
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Icon, name: icon, widget: select, options: [lock, shield, tick] }

          # ---------- Petitions (one per Take Action campaign) ----------
          - label: Petitions
            name: petitions
            widget: object
            collapsed: true
            summary: "{{petitions | keys | length}} petitions"
            fields:
              - label: Remove Us From The REZ
                name: remove-us-from-the-rez
                widget: object
                collapsed: true
                fields:
                  - { label: Slug, name: slug, widget: string, default: remove-us-from-the-rez }
                  - { label: Campaign name, name: campaign, widget: string }
                  - { label: Layout, name: layout, widget: select, options: [long-form, simple], default: long-form }
                  - { label: Tone, name: tone, widget: select, options: [navy, red, paddock] }
                  - { label: Hero eyebrow, name: heroEyebrow, widget: string, required: false }
                  - { label: Hero heading (HTML), name: headingHtml, widget: string }
                  - { label: Hero subheading, name: subheading, widget: text }
                  - label: Context paragraphs (above the form)
                    name: context
                    widget: list
                    field: { label: Paragraph, name: text, widget: text }
                  - { label: Petition statement heading, name: petitionStatementHeading, widget: string }
                  - label: Petition statement clauses
                    name: petitionStatement
                    widget: list
                    field: { label: Clause, name: text, widget: text }
                  - label: Trust badges
                    name: trustBadges
                    widget: list
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: Icon, name: icon, widget: select, options: [lock, shield, tick] }
                      - { label: Sub-label, name: sub, widget: string, required: false }
                  - { label: Current count, name: currentCount, widget: number, value_type: int }
                  - { label: Next milestone, name: nextMilestone, widget: number, value_type: int }
                  - { label: Goal, name: goal, widget: number, value_type: int }
                  - { label: Submit label, name: submitLabel, widget: string }
                  - { label: Submitting label, name: submittingLabel, widget: string }
                  - { label: "Thanks heading HTML (supports first placeholder)", name: thanksHeadingHtml, widget: string }
                  - { label: "Thanks lede (supports first + count placeholders)", name: thanksLede, widget: text }
                  - { label: Share text, name: shareText, widget: text }
                  - { label: "Back link href", name: ctaHrefBack, widget: string }
                  - { label: "Why this matters — heading", name: whyMattersHeading, widget: string }
                  - label: "Why this matters — blocks"
                    name: whyMatters
                    widget: list
                    fields:
                      - { label: Heading, name: heading, widget: string }
                      - { label: Body, name: body, widget: text }
                  - label: "Bottom CTA"
                    name: bottomCta
                    widget: object
                    fields:
                      - { label: Heading, name: heading, widget: string }
                      - { label: Body, name: body, widget: text }
                      - { label: Primary button label, name: primaryLabel, widget: string }
                      - { label: Primary button anchor, name: primaryAnchor, widget: string, default: "#sign" }
                      - { label: Secondary button label, name: secondaryLabel, widget: string }
                      - { label: Secondary button href, name: secondaryHref, widget: string, default: "/#donate" }

              - label: Hold the Gate
                name: hold-the-gate
                widget: object
                collapsed: true
                fields:
                  - { label: Slug, name: slug, widget: string, default: hold-the-gate }
                  - { label: Campaign name, name: campaign, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Lede, name: lede, widget: text }
                  - { label: Demands intro, name: demandsIntro, widget: string }
                  - label: Demands
                    name: demands
                    widget: list
                    fields:
                      - { label: Numeral, name: numeral, widget: string }
                      - { label: Text, name: text, widget: text }
                  - { label: Current count, name: currentCount, widget: number, value_type: int }
                  - { label: Next milestone, name: nextMilestone, widget: number, value_type: int }
                  - { label: Goal, name: goal, widget: number, value_type: int }
                  - { label: Submit label, name: submitLabel, widget: string }
                  - { label: Submitting label, name: submittingLabel, widget: string }
                  - { label: "Thanks heading HTML (supports first placeholder)", name: thanksHeadingHtml, widget: string }
                  - { label: "Thanks lede (supports first + count placeholders)", name: thanksLede, widget: text }
                  - { label: Share text, name: shareText, widget: text }
                  - { label: "Back link href", name: ctaHrefBack, widget: string }
                  - { label: Tone, name: tone, widget: select, options: [navy, red, paddock] }
              - label: Baldwins
                name: baldwins
                widget: object
                collapsed: true
                fields:
                  - { label: Slug, name: slug, widget: string, default: baldwins }
                  - { label: Campaign name, name: campaign, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Lede, name: lede, widget: text }
                  - { label: Demands intro, name: demandsIntro, widget: string }
                  - label: Demands
                    name: demands
                    widget: list
                    fields:
                      - { label: Numeral, name: numeral, widget: string }
                      - { label: Text, name: text, widget: text }
                  - { label: Current count, name: currentCount, widget: number, value_type: int }
                  - { label: Next milestone, name: nextMilestone, widget: number, value_type: int }
                  - { label: Goal, name: goal, widget: number, value_type: int }
                  - { label: Submit label, name: submitLabel, widget: string }
                  - { label: Submitting label, name: submittingLabel, widget: string }
                  - { label: "Thanks heading HTML (supports first placeholder)", name: thanksHeadingHtml, widget: string }
                  - { label: "Thanks lede (supports first + count placeholders)", name: thanksLede, widget: text }
                  - { label: Share text, name: shareText, widget: text }
                  - { label: "Back link href", name: ctaHrefBack, widget: string }
                  - { label: Tone, name: tone, widget: select, options: [navy, red, paddock] }
              - label: Fuel & Fertiliser
                name: fuel-and-fertiliser
                widget: object
                collapsed: true
                fields:
                  - { label: Slug, name: slug, widget: string, default: fuel-and-fertiliser }
                  - { label: Campaign name, name: campaign, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Lede, name: lede, widget: text }
                  - { label: Demands intro, name: demandsIntro, widget: string }
                  - label: Demands
                    name: demands
                    widget: list
                    fields:
                      - { label: Numeral, name: numeral, widget: string }
                      - { label: Text, name: text, widget: text }
                  - { label: Current count, name: currentCount, widget: number, value_type: int }
                  - { label: Next milestone, name: nextMilestone, widget: number, value_type: int }
                  - { label: Goal, name: goal, widget: number, value_type: int }
                  - { label: Submit label, name: submitLabel, widget: string }
                  - { label: Submitting label, name: submittingLabel, widget: string }
                  - { label: "Thanks heading HTML (supports first placeholder)", name: thanksHeadingHtml, widget: string }
                  - { label: "Thanks lede (supports first + count placeholders)", name: thanksLede, widget: text }
                  - { label: Share text, name: shareText, widget: text }
                  - { label: "Back link href", name: ctaHrefBack, widget: string }
                  - { label: Tone, name: tone, widget: select, options: [navy, red, paddock] }
